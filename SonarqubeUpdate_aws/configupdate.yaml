
# 1. Khai báo thông tin đăng nhập Database
apiVersion: v1
kind: Secret
metadata:
  name: sonar-db-secret
  namespace: sonarqube
  labels:
    app.kubernetes.io/name: sonarqube
    app.kubernetes.io/instance: sonarqube
    app.kubernetes.io/component: database-credentials
    app.kubernetes.io/part-of: sonarqube-system
type: Opaque
stringData:
  SONAR_JDBC_USERNAME: "sonar"
  SONAR_JDBC_PASSWORD: "123456789"

---
# 2. Tạo Service và Endpoint cho Database bên ngoài
apiVersion: v1
kind: Service
metadata:
  name: postgres-external
  namespace: sonarqube
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: external-db
    app.kubernetes.io/component: database
spec:
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgres-external
  namespace: sonarqube
subsets:
  - addresses:
      - ip: 172.31.47.157
    ports:
      - port: 5432

---
# 3. Deployment SonarQube với NodeSelector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: sonarqube
  labels:
    app.kubernetes.io/name: sonarqube
    app.kubernetes.io/instance: sonarqube
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: sonarqube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sonarqube
      app.kubernetes.io/instance: sonarqube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sonarqube
        app.kubernetes.io/instance: sonarqube
        app.kubernetes.io/component: server
    spec:
      nodeSelector:
        kubernetes.io/hostname: smashshop
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-sysctl
          image: busybox
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: sonarqube
          image: sonarqube:community
          ports:
            - containerPort: 9000
          env:
            - name: SONAR_JDBC_URL
              value: "jdbc:postgresql://172.31.47.157:5432/sonarqube"
            - name: SONAR_JDBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sonar-db-secret
                  key: SONAR_JDBC_USERNAME
            - name: SONAR_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sonar-db-secret
                  key: SONAR_JDBC_PASSWORD
          # ĐÃ SỬA LỖI THỤT LỀ Ở ĐÂY
          resources:
            limits:
              memory: "4Gi"
              cpu: "2"
            requests:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: sonar-data
              mountPath: /opt/sonarqube/data
      volumes:
        - name: sonar-data
          persistentVolumeClaim:
            claimName: sonar-pvc
