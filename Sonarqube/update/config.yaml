
# 1. Khai báo thông tin đăng nhập Database
apiVersion: v1
kind: Secret
metadata:
  name: sonar-db-secret
  namespace: sonarqube
type: Opaque
stringData:
  # Thay bằng user và password bạn đã tạo ở các bước trước
  SONAR_JDBC_USERNAME: "sonar"
  SONAR_JDBC_PASSWORD: "123456789"

---
# 2. Tạo Endpoint để K8s "thấy" Database bên ngoài (External Service)
apiVersion: v1
kind: Service
metadata:
  name: postgres-external
  namespace: sonarqube
spec:
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgres-external
  namespace: sonarqube
subsets:
  - addresses:
      - ip: 192.168.88.133 # IP Ubuntu server của bạn
    ports:
      - port: 5432

---
# 3. Deployment SonarQube
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: sonarqube
  labels:
    app: sonarqube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      initContainers:
        # SonarQube yêu cầu tham số kernel đặc biệt để chạy Elasticsearch
        - name: init-sysctl
          image: busybox
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: sonarqube
          image: sonarqube:community # Hoặc phiên bản bạn đang dùng (lts)
          ports:
            - containerPort: 9000
          env:
            - name: SONAR_JDBC_URL
              value: "jdbc:postgresql://192.168.13.128:5432/sonarqube"
            - name: SONAR_JDBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sonar-db-secret
                  key: SONAR_JDBC_USERNAME
            - name: SONAR_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sonar-db-secret
                  key: SONAR_JDBC_PASSWORD
          resources:
            limits:
              memory: "4Gi"
              cpu: "2"
            requests:
              memory: "2Gi"
              cpu: "1"